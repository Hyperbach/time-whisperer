name: Release Build

# Self-contained Rust pipeline:
#   * every push / PR  -> build + test on Linux and macOS
#   * tag push (v*)    -> build release artifacts (.dmg / .deb / raw binaries)
#                         and publish a GitHub Release
#
# No Nix required: the daemon and CLI build with plain `cargo build --release`.
# The macOS GUI (worklog-gui, eframe) is target-gated to macOS in Cargo.toml,
# so the Linux jobs never pull GUI native dependencies.

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Build & Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-14 ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # build.rs reads git for version metadata

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build (release)
        run: cargo build --release --locked

      - name: Test
        # Integration tests spawn the daemon and bind localhost ports; run them
        # serially to avoid port contention (mirrors run_integration_tests.sh).
        run: cargo test --locked -- --test-threads=1

  build-macos:
    name: Package macOS (arm64)
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    # Apple Silicon only. GitHub is retiring Intel (macos-13) runners and they no
    # longer get allocated for this repo, so an Intel matrix leg hangs forever.
    # Intel coverage can be added later via a universal2 (lipo) build on this same
    # runner — no Intel runner required.
    runs-on: macos-14
    # Signing/notarization secrets (repo Settings → Secrets and variables → Actions).
    # If absent, the build still runs and produces ad-hoc artifacts (Gatekeeper needs
    # right-click → Open). With them present, artifacts are Developer-ID signed +
    # notarized + stapled → clean double-click install.
    env:
      APPLE_DEVELOPER_ID_APP: ${{ secrets.APPLE_DEVELOPER_ID_APP }}
      APPLE_DEVELOPER_ID_INSTALLER: ${{ secrets.APPLE_DEVELOPER_ID_INSTALLER }}
      APPLE_CERT_APP_P12_BASE64: ${{ secrets.APPLE_CERT_APP_P12_BASE64 }}
      APPLE_CERT_INSTALLER_P12_BASE64: ${{ secrets.APPLE_CERT_INSTALLER_P12_BASE64 }}
      APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      APPLE_NOTARY_KEY_P8_BASE64: ${{ secrets.APPLE_NOTARY_KEY_P8_BASE64 }}
      APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
      APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Import Developer ID certificates
        if: env.APPLE_CERT_APP_P12_BASE64 != ''
        run: |
          KC="$RUNNER_TEMP/build.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KC"
          # Two single-identity .p12s (app + installer), imported separately so
          # both identities form (a combined .p12 only yields the first).
          echo "$APPLE_CERT_APP_P12_BASE64"       | base64 --decode > "$RUNNER_TEMP/app.p12"
          echo "$APPLE_CERT_INSTALLER_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/installer.p12"
          for p12 in app installer; do
            security import "$RUNNER_TEMP/$p12.p12" -k "$KC" -P "$APPLE_CERT_PASSWORD" \
              -T /usr/bin/codesign -T /usr/bin/productsign -T /usr/bin/productbuild
          done
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KC"
          # Make the signing keychain searchable (keep the login keychain too).
          security list-keychains -d user -s "$KC" $(security list-keychains -d user | sed 's/"//g')
          rm -f "$RUNNER_TEMP/app.p12" "$RUNNER_TEMP/installer.p12"
          echo "=== signing identities available (cert names, not secret) ==="
          security find-identity -v || true
          security find-identity -v -p basic 2>/dev/null | grep -i "Developer ID" || true

      - name: Build .app, .dmg, and .pkg installer
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # package-pkg.sh builds the .app + .dmg (via package-app.sh) + the .pkg wizard.
          # Signs with Developer ID when APPLE_DEVELOPER_ID_APP/INSTALLER are set.
          VERSION="$VERSION" ./package-pkg.sh

      - name: Notarize & staple
        if: env.APPLE_NOTARY_KEY_P8_BASE64 != ''
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          KEY="$RUNNER_TEMP/notary.p8"
          echo "$APPLE_NOTARY_KEY_P8_BASE64" | base64 --decode > "$KEY"
          for f in "dist/Worklog-${VERSION}.pkg" "dist/Worklog-${VERSION}.dmg"; do
            echo "==> notarizing $f"
            xcrun notarytool submit "$f" --key "$KEY" \
              --key-id "$APPLE_NOTARY_KEY_ID" --issuer "$APPLE_NOTARY_ISSUER_ID" --wait
            xcrun stapler staple "$f"
          done
          rm -f "$KEY"

      - name: Collect artifacts
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p out
          cp "dist/Worklog-${VERSION}.pkg" "out/Worklog-${VERSION}-macos-arm64.pkg"
          cp "dist/Worklog-${VERSION}.dmg" "out/Worklog-${VERSION}-macos-arm64.dmg"
          cd out
          for f in $(ls); do shasum -a 256 "$f" > "$f.sha256"; done
          ls -la

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: out/
          retention-days: 1

  build-linux:
    name: Package Linux (amd64)
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    # NOTE: amd64 only for now. Linux arm64 can be added later via a cross
    # toolchain (e.g. cross / cargo-zigbuild) + an arm64 .deb.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build daemon
        run: cargo build --release --locked --bin time-whisperer

      - name: Collect artifacts
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p out
          cp target/release/time-whisperer "out/time-whisperer-linux-amd64"
          cd out
          for f in $(ls); do sha256sum "$f" > "$f.sha256"; done
          ls -la

      - uses: actions/upload-artifact@v4
        with:
          name: linux-amd64
          path: out/
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: [ build-macos, build-linux ]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f -exec cp {} release-assets/ \;
          ls -la release-assets

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          body: |
            ## TimeWhisperer ${{ github.ref_name }}

            Built from [`${{ github.sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }}) with `cargo build --release`.

            ### Assets
            - `Worklog-*-macos-arm64.pkg` — **macOS installer wizard (recommended)**: installs the app and auto-starts the background monitor. Ad-hoc signed; until notarized, first open needs right-click → Open.
            - `Worklog-*-macos-arm64.dmg` — drag-to-Applications alternative.
            - `time-whisperer-linux-amd64` — standalone Linux daemon binary.

            ### Verify a download
            ```bash
            shasum -a 256 -c <asset>.sha256
            ```
